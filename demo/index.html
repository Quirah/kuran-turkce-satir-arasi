<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kur'an Turkce Satir Arasi Transliterasyon</title>
  <style>
    /* === Mahfuz-inspired Papyrus Theme === */
    :root {
      --bg: #f5efe0;
      --bg-surface: #ece4d0;
      --text: #2c2416;
      --text-secondary: #7a6b52;
      --accent: #8b6914;
      --border: #d4c9ac;
      --word-hover: rgba(139, 105, 20, 0.12);
      --word-hover-text: #6b4c00;
      --bubble-bg: #fffdf7;
      --bubble-shadow: rgba(44, 36, 22, 0.12);
      --font-arabic: "Scheherazade New", "Traditional Arabic", "Amiri", serif;
      --font-body: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    [data-theme="night"] {
      --bg: #0f0e0c;
      --bg-surface: #1a1814;
      --text: #f0ece4;
      --text-secondary: #a09882;
      --accent: #7aad4a;
      --border: #2e2a22;
      --word-hover: rgba(122, 173, 74, 0.15);
      --word-hover-text: #a4d474;
      --bubble-bg: #1e1c18;
      --bubble-shadow: rgba(0, 0, 0, 0.3);
    }

    [data-theme="sea"] {
      --bg: #eef3f2;
      --bg-surface: #dce8e6;
      --text: #1a2c28;
      --text-secondary: #4a6b64;
      --accent: #0d7377;
      --border: #b8ccc8;
      --word-hover: rgba(13, 115, 119, 0.12);
      --word-hover-text: #0a5c5f;
      --bubble-bg: #f5faf9;
      --bubble-shadow: rgba(26, 44, 40, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* === Header === */
    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .header select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      font-family: var(--font-body);
      cursor: pointer;
      max-width: 280px;
    }

    .theme-buttons {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn[data-t="papyrus"] { background: #f5efe0; }
    .theme-btn[data-t="sea"] { background: #eef3f2; }
    .theme-btn[data-t="night"] { background: #0f0e0c; }
    .theme-btn.active { border-color: var(--accent); border-width: 3px; }

    /* === Content === */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* === Verse Block === */
    .verse {
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .verse-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* === Word Row === */
    .words {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      direction: rtl;
      justify-content: center;
      line-height: 2.8;
    }

    /* === Word Bubble === */
    .word {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px 6px 2px;
      transition: background 0.15s;
      position: relative;
    }

    .word:hover {
      background: var(--word-hover);
    }

    .word-arabic {
      font-family: var(--font-arabic);
      font-size: 28px;
      line-height: 1.6;
      color: var(--text);
      direction: rtl;
    }

    .word-translit {
      font-size: 12px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.3;
      margin-top: 2px;
      direction: ltr;
      white-space: nowrap;
    }

    .word-translit .syl {
      color: var(--text-secondary);
    }

    .word-translit .syl-sep {
      color: var(--border);
      margin: 0 0.5px;
    }

    /* === Tooltip (click to expand) === */
    .word-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bubble-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      box-shadow: 0 4px 12px var(--bubble-shadow);
      z-index: 50;
      white-space: nowrap;
      direction: ltr;
    }

    .word-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--border);
    }

    .word.active .word-tooltip {
      display: block;
    }

    .tooltip-translit {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      font-style: italic;
    }

    .tooltip-info {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* === Transliteration Full Line === */
    .verse-translit-line {
      direction: ltr;
      text-align: center;
      font-style: italic;
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.8;
    }

    /* === Loading === */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    /* === Responsive === */
    @media (max-width: 600px) {
      .header { flex-wrap: wrap; gap: 8px; }
      .header h1 { font-size: 14px; }
      .header select { max-width: 100%; flex: 1; }
      .theme-buttons { margin-left: 0; }
      .word-arabic { font-size: 24px; }
      .content { padding: 16px 12px 60px; }
    }

    /* === GitHub link === */
    .github-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .github-link:hover { color: var(--accent); }
    .github-link svg { width: 16px; height: 16px; fill: currentColor; }
  </style>

// === State ===
let translitData = null;
let arabicData = null;
let currentSurah = 1;

// === Load data ===
async function loadData() {
  const [translitRes, arabicRes] = await Promise.all([
    fetch('../output/turkish-syllables.json'),
    fetch('https://api.alquran.cloud/v1/quran/quran-uthmani').then(r => r.json()),
  ]);

  translitData = await translitRes.json();

  // Index Arabic text by "surah:ayah"
  arabicData = {};
  for (const ayah of arabicRes.data.surahs.flatMap(s => s.ayahs)) {
    arabicData[`${ayah.surah.number}:${ayah.numberInSurah}`] = ayah.text;
  }

  populateSurahSelect();
  renderSurah(currentSurah);
}

// === Surah selector ===
function populateSurahSelect() {
  const sel = document.getElementById('surahSelect');
  for (let i = 1; i <= 114; i++) {
    const s = surahMeta[i];
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i}. ${s.name} - ${s.arabic}`;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', (e) => {
    currentSurah = parseInt(e.target.value);
    renderSurah(currentSurah);
  });
}

// === Group words by trailing dash (vasl) ===
function groupWords(arabicWords, translitWords) {
  if (!translitWords) return arabicWords.map((w, i) => ({
    arabic: [w], translit: '', indices: [i]
  }));

  const groups = [];
  let currentArabic = [];
  let currentTranslit = '';
  let currentIndices = [];

  for (let i = 0; i < translitWords.length; i++) {
    const tw = translitWords[i];
    const aw = arabicWords[i] || '';

    currentArabic.push(aw);
    currentIndices.push(i);

    // Check if this word ends with dash (connects to next)
    if (tw.endsWith('-') && i < translitWords.length - 1) {
      currentTranslit += tw;
    } else {
      currentTranslit += tw;
      groups.push({
        arabic: [...currentArabic],
        translit: currentTranslit,
        indices: [...currentIndices]
      });
      currentArabic = [];
      currentTranslit = '';
      currentIndices = [];
    }
  }

  // Remaining
  if (currentArabic.length > 0) {
    groups.push({
      arabic: currentArabic,
      translit: currentTranslit,
      indices: currentIndices
    });
  }

  return groups;
}

// === Format transliteration with styled syllables ===
function formatTranslit(text) {
  // Remove trailing connection dash for display, keep internal dashes as separators
  let display = text.replace(/-$/, '');
  // Split by dash, rejoin with styled separators
  const parts = display.split('-');
  return parts.map((p, i) =>
    `<span class="syl">${p}</span>${i < parts.length - 1 ? '<span class="syl-sep">-</span>' : ''}`
  ).join('');
}

// === Render surah ===
function renderSurah(surahNum) {
  const content = document.getElementById('content');
  const meta = surahMeta[surahNum];

  let html = '';

  for (let v = 1; v <= meta.verses; v++) {
    const key = `${surahNum}:${v}`;
    const arabic = arabicData?.[key] || '';
    const translit = translitData?.[key] || [];

    // Split Arabic text into words
    const arabicWords = arabic.split(/\s+/);
    const groups = groupWords(arabicWords, translit);

    html += `<div class="verse">`;
    html += `<div class="verse-number">${v}</div>`;
    html += `<div class="words">`;

    for (const group of groups) {
      const arabicText = group.arabic.join(' ');
      const translitText = group.translit;
      const cleanTranslit = translitText.replace(/-/g, '').replace(/[.;]/g, '');

      html += `<div class="word" onclick="toggleWord(this)">`;
      html += `<span class="word-arabic">${arabicText}</span>`;
      html += `<span class="word-translit">${formatTranslit(translitText)}</span>`;
      if (cleanTranslit) {
        html += `<div class="word-tooltip">`;
        html += `<div class="tooltip-translit">${cleanTranslit}</div>`;
        html += `<div class="tooltip-info">${group.arabic.length} kelime</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`; // .words

    // Full transliteration line
    const fullTranslit = translit.join(' ').replace(/-/g, ' ').replace(/\s+/g, ' ').replace(/[.;]/g, '').trim();
    if (fullTranslit) {
      html += `<div class="verse-translit-line">${fullTranslit}</div>`;
    }

    html += `</div>`; // .verse
  }

  content.innerHTML = html;
  window.scrollTo(0, 0);
}

// === Word interaction ===
function toggleWord(el) {
  const wasActive = el.classList.contains('active');
  document.querySelectorAll('.word.active').forEach(w => w.classList.remove('active'));
  if (!wasActive) el.classList.add('active');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.word')) {
    document.querySelectorAll('.word.active').forEach(w => w.classList.remove('active'));
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.word.active').forEach(w => w.classList.remove('active'));
  }
});

// === Theme switching ===
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.t;
    if (theme === 'papyrus') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// === Init ===
loadData().catch(err => {
  document.getElementById('content').innerHTML =
    `<div class="loading">Veri yuklenemedi. Lütfen bir HTTP sunucusu uzerinden acin.<br><code>npx serve .</code></div>`;
});
</script>
